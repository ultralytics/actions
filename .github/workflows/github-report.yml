# Summarize open PRs and failed scheduled GitHub Actions across public Ultralytics repositories

name: GitHub Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *" # daily at 06:30 UTC

permissions:
  contents: read
  pull-requests: read

jobs:
  github-report:
    runs-on: ubuntu-latest
    steps:
      - uses: ultralytics/actions/github-report@main
        with:
          token: ${{ secrets._GITHUB_TOKEN }}
          visibility: public
