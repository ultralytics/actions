name: Test Setup uv Action

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/test-setup-uv.yml"
      - "retry/action.yml"
      - "setup-uv/action.yml"
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python_input: "3.14"
            inherited_python: ""
          - os: macos-latest
            python_input: "3.14"
            inherited_python: ""
          - os: ubuntu-latest
            python_input: ""
            inherited_python: "3.14"
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.inherited_python }}
    steps:
      - uses: actions/checkout@v7

      - name: Create stale environment
        run: python3 -m venv .venv && touch .venv/stale

      - uses: ./setup-uv
        with:
          python-version: ${{ matrix.python_input }}
          activate-environment: true

      - name: Verify uv and Python
        run: |
          uv --version
          test "$UV_PYTHON" = "3.14"
          test "$VIRTUAL_ENV" = "$PWD/.venv"
          test ! -e .venv/stale
          python -c 'import sys; assert sys.version_info[:2] == (3, 14)'
